services:
  - type: web
    name: alpha1-status-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
